# Semantic-release configuration for Python repos (python-semantic-release)
#
# ADAPT before appending to pyproject.toml:
#   - {project-name}: the project name from [project] name
#   - {package_name}: Python package name (usually under src/)
#   - assets: include "uv.lock" for uv-based projects, [] for IaC
#   - build_command: "uv lock && uv build" for libraries, "" for IaC
#   - dist_glob_patterns: ["dist/*"] for libraries, [] for IaC
#   - version_variables: path to __init__.py with __version__
#
# IaC NOTE: IaC repos do NOT need a branches.dev config.
# Semantic-release only runs on main (production). Version bumps happen
# at promotion time, not on dev pushes.

[tool.semantic_release]
assets = ["uv.lock"]
commit_message = "chore(release): {project-name} {version}\n\nAutomatically generated by python-semantic-release [skip ci]"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = false
allow_zero_version = false
no_git_verify = false
tag_format = "{project-name}-v{version}"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["src/{package_name}/__init__.py:__version__"]
build_command = "uv lock && uv build"

[tool.semantic_release.branches.main]
match = "main"
prerelease = false

[tool.semantic_release.changelog]
mode = "update"
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.remote.token]
env = "GH_TOKEN"

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = false
